<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>React Concepts Explorer</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c28;
    --border: #2a2a3d;
    --accent: #7c6af7;
    --accent2: #f7c26a;
    --accent3: #6af7c2;
    --text: #e8e8f0;
    --muted: #7070a0;
    --danger: #f76a6a;
    --sidebar-w: 270px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── SIDEBAR ── */
  #sidebar {
    width: var(--sidebar-w);
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    position: fixed;
    top: 0; left: 0; bottom: 0;
    z-index: 100;
    overflow-y: auto;
  }

  .sidebar-logo {
    padding: 24px 20px 16px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-logo h1 {
    font-size: 1.1rem;
    font-weight: 800;
    letter-spacing: -0.5px;
    line-height: 1.2;
  }
  .sidebar-logo span { color: var(--accent); }
  .sidebar-logo p {
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 4px;
    font-family: 'Space Mono', monospace;
  }

  .file-tree {
    padding: 16px 12px;
    flex: 1;
  }
  .file-tree-title {
    font-size: 0.65rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 2px;
    padding: 0 8px;
    margin-bottom: 8px;
    font-family: 'Space Mono', monospace;
  }
  .tree-folder {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 8px;
    font-size: 0.78rem;
    color: var(--muted);
    cursor: default;
  }
  .tree-folder .icon { color: var(--accent2); }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 8px 7px 22px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.82rem;
    color: var(--muted);
    transition: all 0.15s;
    position: relative;
    margin-bottom: 2px;
    font-family: 'Space Mono', monospace;
  }
  .nav-item:hover { color: var(--text); background: var(--surface2); }
  .nav-item.active {
    color: var(--accent);
    background: rgba(124,106,247,0.12);
  }
  .nav-item.active::before {
    content: '';
    position: absolute;
    left: 0; top: 50%;
    transform: translateY(-50%);
    width: 3px; height: 60%;
    background: var(--accent);
    border-radius: 0 3px 3px 0;
  }
  .nav-item .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent3);
    flex-shrink: 0;
  }
  .nav-item.active .dot { background: var(--accent); }

  /* ── MAIN ── */
  #main {
    margin-left: var(--sidebar-w);
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  /* ── TOP BAR ── */
  #topbar {
    position: sticky; top: 0; z-index: 50;
    background: rgba(10,10,15,0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 10px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  #breadcrumb {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  #breadcrumb span { color: var(--accent); }

  .tab-bar { display: flex; gap: 4px; }
  .tab-btn {
    padding: 5px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    cursor: pointer;
    transition: all 0.15s;
  }
  .tab-btn:hover { color: var(--text); border-color: var(--accent); }
  .tab-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  /* ── CONTENT ── */
  #content { flex: 1; padding: 40px 48px; max-width: 860px; }

  .concept-header {
    display: flex;
    align-items: flex-start;
    gap: 20px;
    margin-bottom: 32px;
    padding-bottom: 32px;
    border-bottom: 1px solid var(--border);
  }
  .concept-badge {
    background: rgba(124,106,247,0.15);
    border: 1px solid rgba(124,106,247,0.3);
    color: var(--accent);
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    padding: 4px 10px;
    border-radius: 20px;
    white-space: nowrap;
    margin-top: 6px;
  }
  .concept-header h2 {
    font-size: 2.2rem;
    font-weight: 800;
    letter-spacing: -1px;
    line-height: 1.1;
  }
  .concept-header p {
    color: var(--muted);
    margin-top: 8px;
    font-size: 0.95rem;
    line-height: 1.6;
  }

  /* panels */
  .panel { display: none; }
  .panel.active { display: block; }

  /* explanation */
  .section-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: var(--accent2);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 12px;
  }
  .explain-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 20px;
    line-height: 1.7;
    font-size: 0.92rem;
    color: #c8c8e0;
  }
  .explain-card strong { color: var(--accent2); }
  .explain-card code {
    font-family: 'Space Mono', monospace;
    background: var(--surface2);
    padding: 2px 7px;
    border-radius: 4px;
    font-size: 0.82em;
    color: var(--accent3);
  }
  .when-use {
    background: rgba(106,247,194,0.05);
    border: 1px solid rgba(106,247,194,0.15);
    border-radius: 10px;
    padding: 16px 20px;
    margin-bottom: 20px;
  }
  .when-use h4 {
    color: var(--accent3);
    font-size: 0.8rem;
    margin-bottom: 8px;
    font-family: 'Space Mono', monospace;
  }
  .when-use ul { list-style: none; padding: 0; }
  .when-use li {
    color: #a0a0c0;
    font-size: 0.88rem;
    padding: 3px 0;
    display: flex;
    gap: 8px;
  }
  .when-use li::before { content: '→'; color: var(--accent3); flex-shrink: 0; }

  /* code panel */
  .code-wrapper {
    position: relative;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .code-header {
    background: var(--surface2);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .code-filename {
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    color: var(--accent2);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .code-filename::before {
    content: '';
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent2);
  }
  .copy-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    padding: 4px 10px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .copy-btn:hover { color: var(--text); border-color: var(--accent); }
  .copy-btn.copied { color: var(--accent3); border-color: var(--accent3); }
  pre { margin: 0 !important; border-radius: 0 !important; }
  pre code { font-family: 'Space Mono', monospace !important; font-size: 0.82rem !important; }
  .hljs { background: #0e0e18 !important; padding: 20px !important; }

  /* file structure panel */
  .file-structure {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    line-height: 2;
  }
  .fs-line { display: flex; align-items: center; gap: 8px; }
  .fs-folder { color: var(--accent2); }
  .fs-file { color: var(--accent3); }
  .fs-active { color: var(--accent); font-weight: 700; }
  .fs-comment { color: var(--muted); font-size: 0.72rem; }

  /* preview panel */
  .preview-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .preview-header {
    background: var(--surface2);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid var(--border);
  }
  .preview-dot { width: 10px; height: 10px; border-radius: 50%; }
  .preview-body {
    padding: 24px;
    min-height: 180px;
    display: flex;
    align-items: flex-start;
    justify-content: flex-start;
  }

  /* ── INTERACTIVE PREVIEWS ── */
  .demo { font-family: 'Space Mono', monospace; width: 100%; }
  .demo-btn {
    background: var(--accent);
    border: none;
    color: #fff;
    padding: 8px 20px;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    transition: opacity 0.15s;
    margin-right: 8px;
    margin-bottom: 8px;
  }
  .demo-btn:hover { opacity: 0.85; }
  .demo-btn.secondary {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
  }
  .demo-output {
    margin-top: 14px;
    background: var(--surface2);
    border-radius: 8px;
    padding: 14px 16px;
    font-size: 0.82rem;
    color: var(--accent3);
    min-height: 48px;
    line-height: 1.6;
  }
  .demo-label {
    font-size: 0.65rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 10px;
  }
  .demo-input {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    border-radius: 6px;
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    width: 100%;
    margin-bottom: 10px;
    outline: none;
    transition: border-color 0.15s;
  }
  .demo-input:focus { border-color: var(--accent); }
  .demo-select {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 7px 12px;
    border-radius: 6px;
    font-family: 'Space Mono', monospace;
    font-size: 0.78rem;
    outline: none;
    margin-right: 8px;
  }
  .state-pill {
    display: inline-block;
    background: rgba(124,106,247,0.2);
    border: 1px solid rgba(124,106,247,0.4);
    border-radius: 20px;
    padding: 3px 12px;
    font-size: 0.78rem;
    color: var(--accent);
    margin: 3px;
  }
  .timer-display {
    font-size: 2rem;
    font-weight: 700;
    color: var(--accent2);
    letter-spacing: -1px;
  }
  .router-nav {
    display: flex;
    gap: 4px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .router-link {
    padding: 5px 14px;
    border-radius: 6px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    cursor: pointer;
    font-size: 0.78rem;
    font-family: 'Space Mono', monospace;
    transition: all 0.15s;
  }
  .router-link:hover { color: var(--text); }
  .router-link.active-route { background: var(--accent); border-color: var(--accent); color: #fff; }
  .router-page {
    background: var(--surface2);
    border-radius: 8px;
    padding: 14px 16px;
    font-size: 0.82rem;
    color: var(--accent3);
    min-height: 60px;
  }
  .context-box {
    border: 1px dashed rgba(124,106,247,0.3);
    border-radius: 8px;
    padding: 12px 16px;
    margin-bottom: 8px;
  }
  .context-box-label {
    font-size: 0.65rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }
  .reducer-actions { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }

  /* nav arrows */
  .nav-arrows {
    display: flex;
    gap: 8px;
    padding: 24px 48px;
    border-top: 1px solid var(--border);
    margin-top: auto;
  }
  .arrow-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 10px 20px;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .arrow-btn:hover { color: var(--text); border-color: var(--accent); }
  .arrow-btn:disabled { opacity: 0.3; cursor: default; }
  .arrow-btn.next { margin-left: auto; background: var(--accent); border-color: var(--accent); color: #fff; }
  .arrow-btn.next:hover { opacity: 0.85; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--surface); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside id="sidebar">
  <div class="sidebar-logo">
    <h1><span>React</span> Concepts<br>Explorer</h1>
    <p>// learn by doing</p>
  </div>
  <nav class="file-tree">
    <div class="file-tree-title">src / concepts</div>
    <div class="tree-folder"><span class="icon">📁</span> components</div>
    <div class="nav-item active" onclick="navigate(0)" id="nav-0"><span class="dot"></span>Props.jsx</div>
    <div class="nav-item" onclick="navigate(1)" id="nav-1"><span class="dot"></span>useState.jsx</div>
    <div class="nav-item" onclick="navigate(2)" id="nav-2"><span class="dot"></span>useEffect.jsx</div>
    <div class="nav-item" onclick="navigate(3)" id="nav-3"><span class="dot"></span>useRef.jsx</div>
    <div class="nav-item" onclick="navigate(4)" id="nav-4"><span class="dot"></span>useContext.jsx</div>
    <div class="nav-item" onclick="navigate(5)" id="nav-5"><span class="dot"></span>useReducer.jsx</div>
    <div class="tree-folder" style="margin-top:8px"><span class="icon">📁</span> router</div>
    <div class="nav-item" onclick="navigate(6)" id="nav-6"><span class="dot"></span>RouterDemo.jsx</div>
  </nav>
</aside>

<!-- MAIN -->
<div id="main">
  <!-- TOPBAR -->
  <header id="topbar">
    <div id="breadcrumb">src / concepts / <span id="bc-file">Props.jsx</span></div>
    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('explain')">📖 Explain</button>
      <button class="tab-btn" onclick="switchTab('code')">💻 Code</button>
      <button class="tab-btn" onclick="switchTab('structure')">🗂 Structure</button>
      <button class="tab-btn" onclick="switchTab('preview')">▶ Preview</button>
    </div>
  </header>

  <!-- CONTENT -->
  <div id="content"></div>

  <!-- NAV ARROWS -->
  <div class="nav-arrows">
    <button class="arrow-btn" id="btn-prev" onclick="navigate(currentIndex-1)">← Prev</button>
    <button class="arrow-btn next" id="btn-next" onclick="navigate(currentIndex+1)">Next →</button>
  </div>
</div>

<script>
const concepts = [
  /* ─── 0: PROPS ─── */
  {
    file: 'Props.jsx',
    title: 'Props',
    badge: 'Core Concept',
    subtitle: 'Pass data from parent to child components — the primary communication channel in React.',
    explain: `
      <div class="explain-card">
        <strong>Props (Properties)</strong> are how you pass data <em>into</em> a component from its parent. Think of a component as a function — props are its <code>parameters</code>.<br><br>
        Props are <strong>read-only</strong>: a child component can never modify the props it receives. Data flows in one direction — parent → child. This is called <strong>unidirectional data flow</strong>.
      </div>
      <div class="when-use">
        <h4>// When to use Props</h4>
        <ul>
          <li>Displaying dynamic data inside a reusable component</li>
          <li>Passing callback functions to handle child events</li>
          <li>Configuring component behavior from the outside</li>
          <li>Building component APIs (button size, color, variant…)</li>
        </ul>
      </div>
    `,
    code: `// UserCard.jsx — Child Component
function UserCard({ name, role, avatar, onClick }) {
  return (
    &lt;div className="card" onClick={onClick}&gt;
      &lt;img src={avatar} alt={name} /&gt;
      &lt;h3&gt;{name}&lt;/h3&gt;
      &lt;p&gt;{role}&lt;/p&gt;
    &lt;/div&gt;
  );
}

// App.jsx — Parent Component
function App() {
  const handleClick = (name) =&gt; {
    alert(\`You clicked \${name}!\`);
  };

  return (
    &lt;div&gt;
      &lt;UserCard
        name="Sara Ahmed"
        role="Frontend Dev"
        avatar="/img/sara.jpg"
        onClick={() =&gt; handleClick("Sara")}
      /&gt;
      &lt;UserCard
        name="Khalid Omar"
        role="UI Designer"
        avatar="/img/khalid.jpg"
        onClick={() =&gt; handleClick("Khalid")}
      /&gt;
    &lt;/div&gt;
  );
}`,
    structure: `
      <div class="file-structure">
        <div class="fs-line"><span style="color:var(--muted)">src/</span></div>
        <div class="fs-line"><span style="color:var(--muted)">├── components/</span></div>
        <div class="fs-line"><span style="color:var(--muted)">│   ├── </span><span class="fs-active">UserCard.jsx</span><span class="fs-comment"> &nbsp;← child, receives props</span></div>
        <div class="fs-line"><span style="color:var(--muted)">│   └── UserList.jsx</span><span class="fs-comment"> &nbsp;← renders many UserCards</span></div>
        <div class="fs-line"><span style="color:var(--muted)">└── </span><span class="fs-file">App.jsx</span><span class="fs-comment"> &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;← parent, passes props</span></div>
      </div>
      <p style="color:var(--muted);font-size:0.82rem;margin-top:16px;font-family:'Space Mono',monospace;">Props flow downward only: App → UserList → UserCard</p>
    `,
    preview: () => {
      const users = [
        { name: 'Sara Ahmed', role: 'Frontend Dev', color: '#7c6af7' },
        { name: 'Khalid Omar', role: 'UI Designer', color: '#f7c26a' },
        { name: 'Layla Hassan', role: 'Backend Dev', color: '#6af7c2' },
      ];
      let out = `<div class="demo">
        <div class="demo-label">Props passed to &lt;UserCard /&gt;</div>
        <div style="display:flex;gap:12px;flex-wrap:wrap;">`;
      users.forEach(u => {
        out += `<div style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:16px;text-align:center;cursor:pointer;transition:transform 0.15s;" onmouseenter="this.style.transform='translateY(-3px)'" onmouseleave="this.style.transform=''" onclick="document.getElementById('props-out').textContent='Clicked: ${u.name} — ${u.role}'">
          <div style="width:44px;height:44px;border-radius:50%;background:${u.color}33;border:2px solid ${u.color};display:flex;align-items:center;justify-content:center;margin:0 auto 10px;font-size:1.2rem;">${u.name[0]}</div>
          <div style="font-size:0.82rem;font-weight:700;">${u.name}</div>
          <div style="font-size:0.72rem;color:var(--muted);">${u.role}</div>
        </div>`;
      });
      out += `</div><div class="demo-output" id="props-out">Click a card to fire the onClick prop →</div></div>`;
      return out;
    }
  },

  /* ─── 1: useState ─── */
  {
    file: 'useState.jsx',
    title: 'useState',
    badge: 'Hook',
    subtitle: 'Add reactive local state to functional components — when state changes, the component re-renders.',
    explain: `
      <div class="explain-card">
        <strong>useState</strong> is a Hook that lets you add <strong>state variables</strong> to a functional component.<br><br>
        Syntax: <code>const [value, setValue] = useState(initialValue)</code><br><br>
        Every time you call <code>setValue()</code>, React <strong>re-renders</strong> the component with the new value. The state persists between renders — unlike a plain variable which resets on every render.
      </div>
      <div class="when-use">
        <h4>// When to use useState</h4>
        <ul>
          <li>Toggling UI elements (modal open/closed, dark mode)</li>
          <li>Tracking form input values</li>
          <li>Counting clicks, likes, items in cart</li>
          <li>Storing API response data locally</li>
        </ul>
      </div>
    `,
    code: `import { useState } from 'react';

function Counter() {
  // Declare state: count starts at 0
  const [count, setCount] = useState(0);
  const [theme, setTheme] = useState('light');

  return (
    &lt;div className={theme}&gt;
      &lt;h2&gt;Count: {count}&lt;/h2&gt;

      &lt;button onClick={() =&gt; setCount(count + 1)}&gt;+&lt;/button&gt;
      &lt;button onClick={() =&gt; setCount(count - 1)}&gt;-&lt;/button&gt;
      &lt;button onClick={() =&gt; setCount(0)}&gt;Reset&lt;/button&gt;

      &lt;button onClick={() =&gt;
        setTheme(theme === 'light' ? 'dark' : 'light')
      }&gt;

function Timer() {
  const [seconds, setSeconds] = useState(0);
  const [running, setRunning] = useState(false);

  useEffect(() =&gt; {
    if (!running) return; // skip if paused

    const interval = setInterval(() =&gt; {
      setSeconds(s =&gt; s + 1);
    }, 1000);

    // Cleanup: clear interval when component
    // unmounts or 'running' changes
    return () =&gt; clearInterval(interval);
  }, [running]); // re-run when 'running' changes

  return (
    &lt;div&gt;
      &lt;h2&gt;{seconds}s&lt;/h2&gt;
      &lt;button onClick={() =&gt; setRunning(!running)}&gt;
        {running ? 'Pause' : 'Start'}
      &lt;/button&gt;
      &lt;button onClick={() =&gt; {
        setRunning(false);
        setSeconds(0);
      }}&gt;Reset&lt;/button&gt;
    &lt;/div&gt;
  );
}`,

    code: `import { useReducer } from 'react';

const initialState = { count: 0, history: [] };

function reducer(state, action) {
  switch (action.type) {
    case 'INCREMENT':
      return {
        count: state.count + 1,
        history: [...state.history, '+1']
      };
    case 'DECREMENT':
      return {
        count: state.count - 1,
        history: [...state.history, '-1']
      };
    case 'RESET':
      return initialState;
    case 'ADD':
      return {
        count: state.count + action.payload,
        history: [...state.history, \`+\${action.payload}\`]
      };
    default:
      return state;
  }
}

function Counter() {
  const [state, dispatch] = useReducer(reducer, initialState);

  return (
    &lt;div&gt;
      &lt;h2&gt;{state.count}&lt;/h2&gt;
      &lt;button onClick={() =&gt; dispatch({ type: 'INCREMENT' })}&gt;+&lt;/button&gt;
      &lt;button onClick={() =&gt; dispatch({ type: 'DECREMENT' })}&gt;-&lt;/button&gt;
      &lt;button onClick={() =&gt; dispatch({ type: 'ADD', payload: 10 })}&gt;+10&lt;/button&gt;
      &lt;button onClick={() =&gt; dispatch({ type: 'RESET' })}&gt;Reset&lt;/button&gt;
      &lt;p&gt;History: {state.history.join(', ')}&lt;/p&gt;
    &lt;/div&gt;
  );
}`,

  document.getElementById('bc-file').textContent = c.file;

  // Tab buttons
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.classList.toggle('active', btn.textContent.toLowerCase().includes(currentTab) ||
      (currentTab === 'explain' && btn.textContent.includes('Explain')) ||
      (currentTab === 'code' && btn.textContent.includes('Code')) ||
      (currentTab === 'structure' && btn.textContent.includes('Structure')) ||
      (currentTab === 'preview' && btn.textContent.includes('Preview'))
    );
  });

  // Nav arrows
  document.getElementById('btn-prev').disabled = currentIndex === 0;
  document.getElementById('btn-next').disabled = currentIndex === concepts.length - 1;

  // Content
  let html = `
    <div class="concept-header">
      <div>
        <div class="concept-badge">${c.badge}</div>
      </div>
      <div>
        <h2>${c.title}</h2>
        <p>${c.subtitle}</p>
      </div>
    </div>
  `;

  if (currentTab === 'explain') {
    html += `<div class="section-label">// Explanation</div>${c.explain}`;
  } else if (currentTab === 'code') {
    html += `
      <div class="section-label">// Example Code</div>
      <div class="code-wrapper">
        <div class="code-header">
          <div class="code-filename">${c.file}</div>
          <button class="copy-btn" onclick="copyCode(this)">Copy</button>
        </div>
        <pre><code class="language-jsx">${c.code}</code></pre>
      </div>
    `;
  } else if (currentTab === 'structure') {
    html += `<div class="section-label">// File Structure</div>${c.structure}`;
  } else if (currentTab === 'preview') {
    html += `
      <div class="section-label">// Live Preview</div>
      <div class="preview-box">
        <div class="preview-header">
          <div class="preview-dot" style="background:#f76a6a"></div>
          <div class="preview-dot" style="background:#f7c26a"></div>
          <div class="preview-dot" style="background:#6af7c2"></div>
          <span style="font-family:'Space Mono',monospace;font-size:0.7rem;color:var(--muted);margin-left:8px">${c.file}</span>
        </div>
        <div class="preview-body">
          ${typeof c.preview === 'function' ? c.preview() : c.preview}
        </div>
      </div>
    `;
  }

  document.getElementById('content').innerHTML = html;

  // Highlight code
  if (currentTab === 'code') {
    document.querySelectorAll('pre code').forEach(el => {
      hljs.highlightElement(el);
    });
  }

  // Re-init effect demo
  if (currentTab === 'preview' && currentIndex === 2) {
    effSeconds = 0; effRunning = false;
    if (effInterval) clearInterval(effInterval);
    document.getElementById('eff-log').textContent = 'Effect status: idle — click Start to mount interval';
  }
  if (currentTab === 'preview' && currentIndex === 3) {
    window._refCount = 0;
  }
  if (currentTab === 'preview' && currentIndex === 4) {
    window._ctxTheme = 'light';
  }
  if (currentTab === 'preview' && currentIndex === 5) {
    redState = { count: 0, history: [] };
  }
}

// ── PREVIEW INTERACTIONS ──

// useState
function usDs(action) {
  const el = document.getElementById('cnt');
  if (!el) return;
  let v = parseInt(el.textContent);
  if (action === 1) v++;
  else if (action === -1) v--;
  else v = 0;
  el.textContent = v;
}

// useEffect timer
function effToggle() {
  effRunning = !effRunning;
  const btn = document.getElementById('eff-btn');
  const log = document.getElementById('eff-log');
  if (effRunning) {
    btn.textContent = '⏸ Pause';
    log.textContent = 'Effect: setInterval started — cleanup fn ready';
    effInterval = setInterval(() => {
      effSeconds++;
      const m = String(Math.floor(effSeconds/60)).padStart(2,'0');
      const s = String(effSeconds%60).padStart(2,'0');
      const t = document.getElementById('eff-timer');
      if (t) t.textContent = m+':'+s;
    }, 1000);
  } else {
    btn.textContent = '▶ Start';
    log.textContent = 'Effect: clearInterval called — cleanup ran!';
    clearInterval(effInterval);
  }
}
function effReset() {
  clearInterval(effInterval);
  effRunning = false; effSeconds = 0;
  const t = document.getElementById('eff-timer');
  const b = document.getElementById('eff-btn');
  const l = document.getElementById('eff-log');
  if (t) t.textContent = '00:00';
  if (b) b.textContent = '▶ Start';
  if (l) l.textContent = 'Effect: reset — interval cleared';
}

// useRef
function refLog(msg) {
  const el = document.getElementById('ref-log');
  if (el) el.textContent = msg;
}
function refCount() {
  window._refCount++;
}

// useContext
window._ctxTheme = 'light';
function ctxToggle() {
  window._ctxTheme = window._ctxTheme === 'light' ? 'dark' : 'light';
  const btn = document.getElementById('ctx-btn');
  const out = document.getElementById('ctx-out');
  if (btn) btn.textContent = window._ctxTheme === 'dark' ? '☀️ Switch to Light' : '🌙 Switch to Dark';
  if (out) out.textContent = `theme = "${window._ctxTheme}" — consumed from context, no props passed!`;
}

// useReducer
function redDispatch(type) {
  if (type === 'INCREMENT') { redState.count++; redState.history.push('+1'); }
  else if (type === 'DECREMENT') { redState.count--; redState.history.push('-1'); }
  else if (type === 'ADD10') { redState.count += 10; redState.history.push('+10'); }
  else if (type === 'RESET') { redState = { count: 0, history: ['RESET'] }; }
  const c = document.getElementById('red-count');
  const h = document.getElementById('red-hist');
  if (c) c.textContent = redState.count;
  if (h) h.textContent = redState.history.length ? redState.history.join(' → ') : 'No actions dispatched yet';
}

// Router
function routeTo(page, el) {
  document.querySelectorAll('.router-link').forEach(l => l.classList.remove('active-route'));
  el.classList.add('active-route');
  const p = pages[page];
  const rp = document.getElementById('router-page');
  const ru = document.getElementById('router-url');
  if (rp) rp.innerHTML = p.content;
  if (ru) ru.textContent = 'URL: ' + p.url;
}

// Copy code
function copyCode(btn) {
  const code = document.querySelector('pre code');
  if (!code) return;
  navigator.clipboard.writeText(code.innerText).then(() => {
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
  });
}

// Initial render
render();
</script>
</body>
</html>
